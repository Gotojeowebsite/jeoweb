	<!-- Script -->
	<script>
	(function(){
		function showOverlay(msg){
			let el = document.getElementById('errorOverlay');
			if (!el){
				el = document.createElement('div');
				el.id = 'errorOverlay';
				el.style.cssText = 'position:fixed;inset:16px;padding:24px;border-radius:16px;background:rgba(0,0,0,0.95);color:#fff;font-family:system-ui;z-index:99999;overflow:auto;max-height:60vh;border:1px solid rgba(255,255,255,0.1)';
				document.body.appendChild(el);
			}
			el.textContent = msg;
			el.style.display = 'block';
		}

		window.addEventListener('error', function(e){ showOverlay('Error: ' + (e.error?.message || e.message)); });
		window.addEventListener('unhandledrejection', function(e){ showOverlay('Unhandled rejection: ' + (e.reason?.message || String(e.reason))); });

		document.addEventListener('keydown', function(e){
			if (e.key === 'Escape'){
				const modal = document.getElementById('playModal');
				if (modal && !modal.classList.contains('hidden')){
					document.getElementById('closeModal')?.click();
				}
			}
		});

		class RetroApp {
			constructor() {
				this.games = [];
				this.fallbackImage = 'notavailable.svg';
				this.initElements();
				this.loadTheme();
				this.loadAccent();
				this.loadBackground();
				this.initCloaker();
				this.bindUI();
				this.bootstrap();
			}

			async bootstrap() { await this.loadGames(); }

			async loadGames() {
				try {
					const resp = await fetch('games_list.json', { cache: 'no-store' });
					if (resp.ok) {
						const data = await resp.json();
						if (Array.isArray(data)) {
							this.games = data.filter(g => g.type === 'snes');
						}
					}
				} catch(e) { console.warn('Could not load games_list.json', e); }

				if (this.games.length === 0) {
					try {
						const resp = await fetch('/api/games', { cache: 'no-store' });
						if (resp.ok) {
							const data = await resp.json();
							if (Array.isArray(data)) {
								this.games = data.filter(g => g.type === 'snes');
							}
						}
					} catch(e) {}
				}

				this.updateCounter();
				this.renderGames();
				this.hideLoading();
			}

			initElements() {
				this.searchInput = document.getElementById('searchInput');
				this.gameGrid = document.getElementById('gameGrid');
				this.retroPageCount = document.getElementById('retroPageCount');
				this.loadingState = document.getElementById('loadingState');
				this.themeToggle = document.getElementById('themeToggle');
				this.playModal = document.getElementById('playModal');
				this.gameFrame = document.getElementById('gameFrame');
				this.closeModal = document.getElementById('closeModal');
				this.fullscreenBtn = document.getElementById('fullscreenBtn');
				this.openNewTabBtn = document.getElementById('openNewTabBtn');
				this.currentGameUrl = '';
			}

			hideLoading() { if (this.loadingState) this.loadingState.style.display = 'none'; }

			updateCounter() {
				if (!this.retroPageCount) return;
				const target = this.games.length;
				const current = parseInt(this.retroPageCount.textContent) || 0;
				if (current === target) return;
				const step = target > current ? 1 : -1;
				const steps = Math.abs(target - current);
				const interval = Math.max(Math.floor(500 / steps), 5);
				let count = current;
				const timer = setInterval(() => {
					count += step;
					this.retroPageCount.textContent = count;
					if (count === target) clearInterval(timer);
				}, interval);
			}

			loadTheme() {
				const saved = localStorage.getItem('site-theme');
				if (saved === 'light') {
					document.body.classList.add('theme-light');
					document.body.classList.remove('theme-dark');
					if (this.themeToggle) this.themeToggle.textContent = '☀️';
				} else {
					document.body.classList.add('theme-dark');
					document.body.classList.remove('theme-light');
					if (this.themeToggle) this.themeToggle.textContent = '🌙';
				}
			}

			toggleTheme() {
				if (document.body.classList.contains('theme-light')) {
					document.body.classList.remove('theme-light');
					document.body.classList.add('theme-dark');
					localStorage.setItem('site-theme', 'dark');
					if (this.themeToggle) this.themeToggle.textContent = '🌙';
				} else {
					document.body.classList.remove('theme-dark');
					document.body.classList.add('theme-light');
					localStorage.setItem('site-theme', 'light');
					if (this.themeToggle) this.themeToggle.textContent = '☀️';
				}
			}

			loadAccent() {
				const saved = localStorage.getItem('site-accent');
				if (saved) this.setAccent(saved, false);
				const accentInput = document.getElementById('accentColorInput');
				const accentValue = document.getElementById('accentColorValue');
				const accentReset = document.getElementById('accentReset');
				const current = saved || '#7c3aed';
				if (accentInput) {
					accentInput.value = current;
					if (accentValue) accentValue.textContent = current;
					accentInput.addEventListener('input', () => {
						this.setAccent(accentInput.value, true);
						if (accentValue) accentValue.textContent = accentInput.value;
					});
				}
				if (accentReset) {
					accentReset.addEventListener('click', () => {
						this.setAccent('#7c3aed', true);
						if (accentInput) accentInput.value = '#7c3aed';
						if (accentValue) accentValue.textContent = '#7c3aed';
					});
				}
			}

			setAccent(color, save) {
				document.documentElement.style.setProperty('--primary', color);
				const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
				const darker = '#' + [r,g,b].map(c => Math.max(0, c - 30).toString(16).padStart(2,'0')).join('');
				document.documentElement.style.setProperty('--primary-hover', darker);
				if (save) localStorage.setItem('site-accent', color);
			}

			loadBackground() {
				const savedBg = localStorage.getItem('site-bg-color');
				if (savedBg) this.setBgColor(savedBg, false);
				const current = savedBg || '#0c0b14';
				const bgInput = document.getElementById('bgColorInput');
				const bgValue = document.getElementById('bgColorValue');
				const bgReset = document.getElementById('bgReset');
				if (bgInput) {
					bgInput.value = current;
					if (bgValue) bgValue.textContent = current;
					bgInput.addEventListener('input', () => {
						this.setBgColor(bgInput.value, true);
						if (bgValue) bgValue.textContent = bgInput.value;
					});
				}
				if (bgReset) {
					bgReset.addEventListener('click', () => {
						this.setBgColor('#0c0b14', true);
						if (bgInput) bgInput.value = '#0c0b14';
						if (bgValue) bgValue.textContent = '#0c0b14';
					});
				}
				const savedImg = localStorage.getItem('site-bg-image');
				if (savedImg) this.applyBgImage(savedImg);
				const fileInput = document.getElementById('bgImageInput');
				const clearBtn = document.getElementById('bgImageClear');
				if (fileInput) {
					fileInput.addEventListener('change', (e) => {
						const file = e.target.files[0];
						if (!file) return;
						const reader = new FileReader();
						reader.onload = (ev) => {
							try { localStorage.setItem('site-bg-image', ev.target.result); } catch(err) {}
							this.applyBgImage(ev.target.result);
						};
						reader.readAsDataURL(file);
					});
				}
				if (clearBtn) {
					clearBtn.addEventListener('click', () => {
						localStorage.removeItem('site-bg-image');
						this.removeBgImage();
					});
				}
			}

			setBgColor(color, save) {
				document.documentElement.style.setProperty('--bg', color);
				const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
				const lighter = '#' + [r,g,b].map(c => Math.min(255, c + 12).toString(16).padStart(2,'0')).join('');
				const cardL = '#' + [r,g,b].map(c => Math.min(255, c + 18).toString(16).padStart(2,'0')).join('');
				document.documentElement.style.setProperty('--bg-surface', lighter);
				document.documentElement.style.setProperty('--card-bg', cardL);
				if (save) localStorage.setItem('site-bg-color', color);
			}

			applyBgImage(url) {
				document.body.style.backgroundImage = 'url(' + url + ')';
				document.body.style.backgroundSize = 'cover';
				document.body.style.backgroundPosition = 'center';
				document.body.style.backgroundAttachment = 'fixed';
				document.body.classList.add('has-bg-image');
			}

			removeBgImage() {
				document.body.style.backgroundImage = '';
				document.body.style.backgroundSize = '';
				document.body.style.backgroundPosition = '';
				document.body.style.backgroundAttachment = '';
				document.body.classList.remove('has-bg-image');
			}

			bindUI() {
				this.searchInput.addEventListener('input', () => this.renderGames());
				this.themeToggle.addEventListener('click', () => this.toggleTheme());
				this.closeModal.addEventListener('click', () => this.closePlayer());
				this.fullscreenBtn.addEventListener('click', () => this.toggleFullscreen());
				this.openNewTabBtn.addEventListener('click', () => this.openGameInNewTab());

				const colorBtn = document.getElementById('colorPickerBtn');
				const colorMenu = document.getElementById('colorMenu');
				if (colorBtn && colorMenu) {
					colorBtn.addEventListener('click', (e) => {
						e.stopPropagation();
						colorMenu.classList.toggle('open');
						const cm = document.getElementById('cloakerMenu');
						if (cm) cm.classList.remove('open');
					});
					document.addEventListener('click', (e) => {
						if (!colorMenu.contains(e.target) && e.target !== colorBtn) colorMenu.classList.remove('open');
					});
				}

				const cloakerBtn = document.getElementById('cloakerBtn');
				const cloakerMenu = document.getElementById('cloakerMenu');
				if (cloakerBtn && cloakerMenu) {
					cloakerBtn.addEventListener('click', (e) => {
						e.stopPropagation();
						cloakerMenu.classList.toggle('open');
						if (colorMenu) colorMenu.classList.remove('open');
					});
					document.addEventListener('click', (e) => {
						if (!cloakerMenu.contains(e.target) && !cloakerBtn.contains(e.target)) cloakerMenu.classList.remove('open');
					});
				}
			}

			renderGames() {
				const q = (this.searchInput.value || '').toLowerCase();
				this.gameGrid.innerHTML = '';
				const filtered = this.games.filter(g => !q || g.name.toLowerCase().includes(q));
				if (filtered.length === 0) {
					this.gameGrid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><h3>No retro games found</h3><p>Try a different search term</p></div>';
					return;
				}
				filtered.forEach(g => {
					const imgSrc = g.image || this.fallbackImage;
					const requestedBadge = g.requested ? '<span class="requested-badge">📩 Requested</span>' : '';
					const card = document.createElement('div');
					card.className = 'game-card';
					card.innerHTML = '<div class="game-thumb"><img src="' + imgSrc + '" alt="' + g.name + '" loading="lazy" onerror="this.onerror=null;this.src=\'' + this.fallbackImage + '\';" /><span class="retro-badge">🎮 Retro</span>' + requestedBadge + '</div><div class="game-card-content"><div class="game-card-title">' + g.name + '</div><button class="play-btn">▶ Play</button></div>';
					card.querySelector('.play-btn').addEventListener('click', (e) => { e.stopPropagation(); this.playGame(g); });
					card.addEventListener('dblclick', () => this.playGame(g));
					this.gameGrid.appendChild(card);
				});
			}

			playGame(game) { this.openPlayer(game.url); }

			openPlayer(url) {
				var target = url;
				if (!target.match(/\.(html|swf)(\?|$)/i)) {
					if (target.endsWith('/')) target += 'index.html';
					else target += '/index.html';
				}
				this.currentGameUrl = target;
				this.gameFrame.src = target;
				this.playModal.classList.remove('hidden');
				this.playModal.setAttribute('aria-hidden', 'false');
				document.body.style.overflow = 'hidden';
			}

			toggleFullscreen() {
				const inner = this.playModal.querySelector('.modal-inner');
				if (!document.fullscreenElement) {
					(inner.requestFullscreen || inner.webkitRequestFullscreen || inner.msRequestFullscreen).call(inner);
				} else {
					(document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
				}
			}

			openGameInNewTab() {
				if (this.currentGameUrl) window.open(this.currentGameUrl, '_blank');
			}

			closePlayer() {
				this.gameFrame.src = 'about:blank';
				this.playModal.classList.add('hidden');
				this.playModal.setAttribute('aria-hidden', 'true');
				document.body.style.overflow = '';
			}

			initCloaker() {
				this.originalTitle = document.title;
				this.originalFavicon = (document.querySelector('link[rel*="icon"]') || {}).href || '';
				const savedCloak = JSON.parse(localStorage.getItem('jeo-cloak') || 'null');
				if (savedCloak) this.applyCloak(savedCloak.title, savedCloak.icon, false);

				document.querySelectorAll('.cloaker-preset').forEach(btn => {
					btn.addEventListener('click', () => {
						this.applyCloak(btn.dataset.title, btn.dataset.icon, true);
						this.highlightPreset(btn.dataset.title, btn.dataset.icon);
						const ti = document.getElementById('cloakerTitle');
						const ii = document.getElementById('cloakerIcon');
						if (ti) ti.value = btn.dataset.title;
						if (ii) ii.value = btn.dataset.icon;
					});
				});

				const applyBtn = document.getElementById('cloakerApply');
				if (applyBtn) {
					applyBtn.addEventListener('click', () => {
						const t = (document.getElementById('cloakerTitle').value || '').trim();
						const i = (document.getElementById('cloakerIcon').value || '').trim();
						if (t || i) this.applyCloak(t || document.title, i || '', true);
					});
				}

				const resetBtn = document.getElementById('cloakerReset');
				if (resetBtn) {
					resetBtn.addEventListener('click', () => this.resetCloak());
				}

				if (savedCloak) {
					this.highlightPreset(savedCloak.title, savedCloak.icon);
					const ti = document.getElementById('cloakerTitle');
					const ii = document.getElementById('cloakerIcon');
					if (ti) ti.value = savedCloak.title || '';
					if (ii) ii.value = savedCloak.icon || '';
				}
			}

			applyCloak(title, iconUrl, save) {
				if (title) document.title = title;
				if (iconUrl) {
					let l = document.querySelector('link[rel*="icon"]');
					if (!l) { l = document.createElement('link'); l.rel = 'icon'; document.head.appendChild(l); }
					l.href = iconUrl; l.type = 'image/x-icon';
				}
				if (save) localStorage.setItem('jeo-cloak', JSON.stringify({ title, icon: iconUrl }));
			}

			resetCloak() {
				document.title = this.originalTitle;
				const l = document.querySelector('link[rel*="icon"]');
				if (l && this.originalFavicon) l.href = this.originalFavicon;
				else if (l) l.remove();
				localStorage.removeItem('jeo-cloak');
				this.highlightPreset(null, null);
				const ti = document.getElementById('cloakerTitle');
				const ii = document.getElementById('cloakerIcon');
				if (ti) ti.value = '';
				if (ii) ii.value = '';
			}

			highlightPreset(title, icon) {
				document.querySelectorAll('.cloaker-preset').forEach(b => {
					b.classList.toggle('active', title && b.dataset.title === title && b.dataset.icon === icon);
				});
			}
		}

		if (document.readyState === 'loading') {
			window.addEventListener('DOMContentLoaded', () => new RetroApp());
		} else {
			new RetroApp();
		}
	})();
	</script>
</body>
</html>
