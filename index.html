<!DOCTYPE html>
<html lang="en">
<head>
	<!-- Google tag (gtag.js) -->
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-DQM8XXB9GC"></script>
	<script>
	  window.dataLayer = window.dataLayer || [];
	  function gtag(){dataLayer.push(arguments);}
	  gtag('js', new Date());

	  gtag('config', 'G-DQM8XXB9GC');
	</script>
	
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Jeo Unblocked Games</title>
	<link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-dark">
	
	<header class="topbar">
		<div class="header-left">
			<a href="/" class="brand-section">
				<div class="brand-text">jeo</div>
			</a>
		</div>
		<div class="header-right">
			<div class="color-picker-wrap">
				<button id="colorPickerBtn" class="header-btn" aria-label="Change accent color">🎨</button>
				<div id="colorMenu" class="color-menu">
					<div class="color-menu-label">Accent Color</div>
					<div class="color-swatches">
						<button class="color-swatch active" data-color="#7c3aed" title="Purple" style="--swatch:#7c3aed"></button>
						<button class="color-swatch" data-color="#3b82f6" title="Blue" style="--swatch:#3b82f6"></button>
						<button class="color-swatch" data-color="#06b6d4" title="Cyan" style="--swatch:#06b6d4"></button>
						<button class="color-swatch" data-color="#10b981" title="Green" style="--swatch:#10b981"></button>
						<button class="color-swatch" data-color="#f59e0b" title="Amber" style="--swatch:#f59e0b"></button>
						<button class="color-swatch" data-color="#ef4444" title="Red" style="--swatch:#ef4444"></button>
						<button class="color-swatch" data-color="#ec4899" title="Pink" style="--swatch:#ec4899"></button>
						<button class="color-swatch" data-color="#f97316" title="Orange" style="--swatch:#f97316"></button>
					</div>

					<div class="menu-divider"></div>

					<div class="color-menu-label">Background</div>
					<div class="color-swatches">
						<button class="bg-swatch" data-bg="#0c0b14" title="Default" style="--swatch:#0c0b14"></button>
						<button class="bg-swatch" data-bg="#0f172a" title="Slate" style="--swatch:#0f172a"></button>
						<button class="bg-swatch" data-bg="#1a1a2e" title="Navy" style="--swatch:#1a1a2e"></button>
						<button class="bg-swatch" data-bg="#0d1117" title="Charcoal" style="--swatch:#0d1117"></button>
						<button class="bg-swatch" data-bg="#1b1b1b" title="Dark" style="--swatch:#1b1b1b"></button>
						<button class="bg-swatch" data-bg="#191724" title="Rosé Pine" style="--swatch:#191724"></button>
						<button class="bg-swatch" data-bg="#162016" title="Forest" style="--swatch:#162016"></button>
						<button class="bg-swatch" data-bg="#1c1412" title="Mocha" style="--swatch:#1c1412"></button>
					</div>

					<div class="menu-divider"></div>

					<div class="color-menu-label">Background Image</div>
					<div class="bg-image-controls">
						<label class="bg-upload-btn" for="bgImageInput">Upload Image</label>
						<input type="file" id="bgImageInput" accept="image/*" hidden />
						<button id="bgImageClear" class="bg-clear-btn">Remove</button>
					</div>
					<div id="bgPreview" class="bg-preview hidden"></div>
				</div>
			</div>
			<button id="themeToggle" class="theme-btn" aria-label="Toggle theme">🌙</button>
		</div>
	</header>

	<!-- Main Content -->
	<main class="main">
		<!-- Hero Section -->
		<section class="hero">
			<h1>Play Unlimited Games</h1>
			<p><span id="gameCount">0</span> games available — no downloads, no sign-ups</p>
		</section>

		<!-- Search & Filter -->
		<section class="toolbar-section">
			<div class="search-container">
				<span class="search-icon">🔍</span>
				<input id="searchInput" class="search-input" placeholder="Search games..." />
			</div>
			<button id="refreshGames" class="refresh-btn">↻ Refresh</button>
		</section>

		<!-- Loading state -->
		<div id="loadingState" class="loading-state">
			<div class="spinner"></div>
			<p>Loading games...</p>
		</div>

		<!-- Games Grid -->
		<section class="games-section">
			<div id="gameGrid" class="game-grid">
				<!-- populated by app.js -->
			</div>
		</section>
	</main>

	<!-- Footer -->
	<footer class="footer">
		<p>© 2026 jeo</p>
	</footer>

	<!-- Play Modal -->
	<div id="playModal" class="modal hidden" aria-hidden="true">
		<div class="modal-inner">
			<button id="closeModal" class="modal-close" aria-label="Close">✕</button>
			<iframe id="gameFrame" src="" frameborder="0" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation allow-top-navigation-by-user-activation allow-modals"></iframe>
		</div>
	</div>

	<!-- Script Loader -->
	<script>
		(function(){
			function showOverlay(msg){
				let el = document.getElementById('errorOverlay');
				if (!el){
					el = document.createElement('div');
					el.id = 'errorOverlay';
					el.style.cssText = [
						'position:fixed',
						'inset:16px',
						'padding:24px',
						'border-radius:16px',
						'background:rgba(0,0,0,0.95)',
						'color:#fff',
						'font-family:system-ui,Segoe UI,Roboto',
						'z-index:99999',
						'overflow:auto',
						'max-height:60vh',
						'border:1px solid rgba(255,255,255,0.1)'
					].join(';');
					document.body.appendChild(el);
				}
				el.textContent = msg;
				el.style.display = 'block';
			}

			window.addEventListener('error', function(e){
				console.error(e.error || e.message);
				showOverlay('Error: ' + (e.error?.message || e.message));
			});

			window.addEventListener('unhandledrejection', function(e){
				console.error('Unhandled rejection', e.reason);
				showOverlay('Unhandled rejection: ' + (e.reason?.message || String(e.reason)));
			});

			function loadScript(src){
				return new Promise(function(resolve, reject){
					const s = document.createElement('script');
					s.src = src;
					s.defer = true;
					s.onload = () => resolve(src);
					s.onerror = () => reject(new Error('Failed to load ' + src));
					document.body.appendChild(s);
				});
			}

			(async function start(){
				try{
					await loadScript('app.js');
				} catch (err) {
					console.error(err);
					showOverlay(err.message || String(err));
				}
			})();

			document.addEventListener('keydown', function(e){
				if (e.key === 'Escape'){
					const modal = document.getElementById('playModal');
					if (modal && !modal.classList.contains('hidden')){
						const close = document.getElementById('closeModal');
						if (close) close.click();
					}
				}
			});
		})();
	</script>
</body>
</html>
