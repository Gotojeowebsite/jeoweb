<!DOCTYPE html>
<html lang="en">
<head>
	<!-- Google tag (gtag.js) -->
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-DQM8XXB9GC"></script>
	<script>
	  window.dataLayer = window.dataLayer || [];
	  function gtag(){dataLayer.push(arguments);}
	  gtag('js', new Date());

	  gtag('config', 'G-DQM8XXB9GC');
	</script>
	
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Jeo Unblocked Games</title>
	<link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-dark">
	
	<header class="topbar">
		<div class="header-left">
			<div class="brand-section">
				<div class="brand-icon">⚡</div>
				<div class="brand-text">JEO</div>
			</div>
		</div>
		<div class="header-right">
			<button id="themeToggle" class="theme-btn" aria-label="Toggle theme">🌙</button>
		</div>
	</header>

	<!-- Main Content -->
	<main class="main">
		<!-- Hero Section -->
		<section class="hero">
			<h1>Play Unlimited Games</h1>
			<p>Access hundreds of unblocked games instantly</p>
			<div class="stats-bar">
				<div class="stat-item">
					<span class="stat-number" id="gameCount">0</span>
					<span class="stat-label">Games Available</span>
				</div>
			</div>
		</section>

		<!-- Search & Filter -->
		<section class="toolbar-section">
			<div class="search-container">
				<span class="search-icon">🔍</span>
				<input id="searchInput" class="search-input" placeholder="Search games..." />
			</div>
			<button id="refreshGames" class="refresh-btn">↻ Refresh</button>
		</section>

		<!-- Loading state -->
		<div id="loadingState" class="loading-state">
			<div class="spinner"></div>
			<p>Loading games...</p>
		</div>

		<!-- Games Grid -->
		<section class="games-section">
			<h2 class="section-title">🎮 Games</h2>
			<div id="gameGrid" class="game-grid">
				<!-- populated by app.js -->
			</div>
		</section>
	</main>

	<!-- Footer -->
	<footer class="footer">
		<p>© 2026 Jeo Unblocked Games • Play Smart, Play Free</p>
	</footer>

	<!-- Play Modal -->
	<div id="playModal" class="modal hidden" aria-hidden="true">
		<div class="modal-inner">
			<button id="closeModal" class="modal-close" aria-label="Close">✕</button>
			<iframe id="gameFrame" src="" frameborder="0" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation allow-top-navigation-by-user-activation allow-modals"></iframe>
		</div>
	</div>

	<!-- Script Loader -->
	<script>
		(function(){
			function showOverlay(msg){
				let el = document.getElementById('errorOverlay');
				if (!el){
					el = document.createElement('div');
					el.id = 'errorOverlay';
					el.style.cssText = [
						'position:fixed',
						'inset:16px',
						'padding:24px',
						'border-radius:16px',
						'background:rgba(0,0,0,0.95)',
						'color:#fff',
						'font-family:system-ui,Segoe UI,Roboto',
						'z-index:99999',
						'overflow:auto',
						'max-height:60vh',
						'border:1px solid rgba(255,255,255,0.1)'
					].join(';');
					document.body.appendChild(el);
				}
				el.textContent = msg;
				el.style.display = 'block';
			}

			window.addEventListener('error', function(e){
				console.error(e.error || e.message);
				showOverlay('Error: ' + (e.error?.message || e.message));
			});

			window.addEventListener('unhandledrejection', function(e){
				console.error('Unhandled rejection', e.reason);
				showOverlay('Unhandled rejection: ' + (e.reason?.message || String(e.reason)));
			});

			function loadScript(src){
				return new Promise(function(resolve, reject){
					const s = document.createElement('script');
					s.src = src;
					s.defer = true;
					s.onload = () => resolve(src);
					s.onerror = () => reject(new Error('Failed to load ' + src));
					document.body.appendChild(s);
				});
			}

			(async function start(){
				try{
					await loadScript('app.js');
				} catch (err) {
					console.error(err);
					showOverlay(err.message || String(err));
				}
			})();

			document.addEventListener('keydown', function(e){
				if (e.key === 'Escape'){
					const modal = document.getElementById('playModal');
					if (modal && !modal.classList.contains('hidden')){
						const close = document.getElementById('closeModal');
						if (close) close.click();
					}
				}
			});
		})();
	</script>
</body>
</html>
