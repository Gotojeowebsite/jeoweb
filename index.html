	<!-- Script Loader -->
	<script>
		(function(){
			function showOverlay(msg){
				let el = document.getElementById('errorOverlay');
				if (!el){
					el = document.createElement('div');
					el.id = 'errorOverlay';
					el.style.cssText = [
						'position:fixed',
						'inset:16px',
						'padding:24px',
						'border-radius:16px',
						'background:rgba(0,0,0,0.95)',
						'color:#fff',
						'font-family:system-ui,Segoe UI,Roboto',
						'z-index:99999',
						'overflow:auto',
						'max-height:60vh',
						'border:1px solid rgba(255,255,255,0.1)'
					].join(';');
					document.body.appendChild(el);
				}
				el.textContent = msg;
				el.style.display = 'block';
			}

			window.addEventListener('error', function(e){
				console.error(e.error || e.message);
				showOverlay('Error: ' + (e.error?.message || e.message));
			});

			window.addEventListener('unhandledrejection', function(e){
				console.error('Unhandled rejection', e.reason);
				showOverlay('Unhandled rejection: ' + (e.reason?.message || String(e.reason)));
			});

			function loadScript(src){
				return new Promise(function(resolve, reject){
					const s = document.createElement('script');
					s.src = src;
					s.defer = true;
					s.onload = () => resolve(src);
					s.onerror = () => reject(new Error('Failed to load ' + src));
					document.body.appendChild(s);
				});
			}

			(async function start(){
				try{
					await loadScript('app.js');
				} catch (err) {
					console.error(err);
					showOverlay(err.message || String(err));
				}

				// Fetch last commit for "Last Updated" badge
				try {
					const resp = await fetch('https://api.github.com/repos/Gotojeowebsite/jeoweb/commits?per_page=1');
					if (resp.ok) {
						const data = await resp.json();
						if (data.length > 0) {
							const d = new Date(data[0].commit.author.date);
							const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
							const timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
							const el = document.getElementById('lastUpdated');
							if (el) el.textContent = 'Last updated: ' + dateStr + ' at ' + timeStr;
						}
					}
				} catch(e) { console.warn('Could not fetch last commit', e); }
			})();

			document.addEventListener('keydown', function(e){
				if (e.key === 'Escape'){
					const modal = document.getElementById('playModal');
					if (modal && !modal.classList.contains('hidden')){
						const close = document.getElementById('closeModal');
						if (close) close.click();
					}
				}
			});
		})();
	</script>
