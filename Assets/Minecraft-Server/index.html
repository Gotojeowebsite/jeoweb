<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Jeo MC</title>
	<style>
		html,body{height:100%;margin:0}
		.frame{position:fixed;inset:0;border:0;width:100%;height:100%}
		.fs-btn{position:fixed;right:12px;bottom:12px;z-index:9999;padding:8px 12px;background:#0008;color:#fff;border:0;border-radius:6px;cursor:pointer}
	</style>
</head>
<body>
	<iframe class="frame" id="siteFrame" src="https://eag.christiancommunitychurch.us/" allowfullscreen></iframe>
	<button class="fs-btn" id="fsBtn">Enter Fullscreen</button>

	<script>
		const fsBtn = document.getElementById('fsBtn');
		const frame = document.getElementById('siteFrame');
		fsBtn.addEventListener('click', async () => {
			try {
				if (document.fullscreenElement) {
					await document.exitFullscreen();
					fsBtn.textContent = 'Enter Fullscreen';
					return;
				}
				// Try to fullscreen the iframe's parent element for widest support
				await frame.requestFullscreen();
				fsBtn.textContent = 'Exit Fullscreen';
			} catch (e) {
				console.warn('Fullscreen request failed:', e);
			}
		});
	</script>
</body>
</html>
