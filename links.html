<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Our Links - Jeo Unblocked Games</title>
	<link rel="stylesheet" href="styles.css" />
	<style>
		.links-page {
			max-width: 900px;
			margin: 0 auto;
			padding: 48px 20px 80px;
			text-align: center;
		}

		/* Back button */
		.links-header {
			display: flex;
			align-items: center;
			gap: 16px;
			margin-bottom: 48px;
		}
		.links-header h1 {
			font-size: 1.5rem;
			color: var(--text);
			margin: 0;
			font-weight: 700;
		}
		.back-btn {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			padding: 8px 18px;
			font-size: 0.9rem;
			font-weight: 600;
			color: var(--primary, #7c3aed);
			background: transparent;
			border: 1.5px solid var(--primary, #7c3aed);
			border-radius: 999px;
			text-decoration: none;
			cursor: pointer;
			transition: background 0.2s, color 0.2s;
		}
		.back-btn:hover {
			background: var(--primary, #7c3aed);
			color: #fff;
		}

		/* Cloud container */
		.cloud-scene {
			position: relative;
			min-height: 520px;
			display: flex;
			flex-direction: column;
			align-items: center;
			padding-top: 20px;
		}

		/* The cloud shape */
		.cloud {
			position: relative;
			width: 260px;
			height: 100px;
			background: var(--card-bg);
			border-radius: 100px;
			box-shadow:
				0 8px 32px rgba(124, 58, 237, 0.18),
				inset 0 -4px 12px rgba(0,0,0,0.1);
			border: 1px solid var(--border);
			z-index: 10;
			display: flex;
			align-items: center;
			justify-content: center;
			animation: cloudFloat 4s ease-in-out infinite;
		}
		.cloud::before,
		.cloud::after {
			content: '';
			position: absolute;
			background: var(--card-bg);
			border-radius: 50%;
			border: 1px solid var(--border);
			z-index: -1;
		}
		.cloud::before {
			width: 130px;
			height: 130px;
			top: -60px;
			left: 40px;
			box-shadow: 0 4px 20px rgba(124, 58, 237, 0.12);
		}
		.cloud::after {
			width: 90px;
			height: 90px;
			top: -40px;
			right: 35px;
			box-shadow: 0 4px 16px rgba(124, 58, 237, 0.1);
		}

		.cloud-label {
			font-size: 1.1rem;
			font-weight: 700;
			color: var(--primary);
			letter-spacing: 1px;
			text-transform: uppercase;
			z-index: 11;
		}

		@keyframes cloudFloat {
			0%, 100% { transform: translateY(0); }
			50% { transform: translateY(-10px); }
		}

		/* Streams from cloud to links */
		.streams {
			position: relative;
			width: 100%;
			height: 80px;
			display: flex;
			justify-content: center;
		}

		.stream-line {
			position: absolute;
			top: 0;
			width: 2px;
			height: 80px;
			background: linear-gradient(to bottom, var(--primary), transparent);
			opacity: 0.5;
			animation: streamPulse 2s ease-in-out infinite;
		}
		.stream-line:nth-child(1) { left: 20%; animation-delay: 0s; }
		.stream-line:nth-child(2) { left: 35%; animation-delay: 0.3s; }
		.stream-line:nth-child(3) { left: 50%; animation-delay: 0.6s; }
		.stream-line:nth-child(4) { left: 65%; animation-delay: 0.9s; }
		.stream-line:nth-child(5) { left: 80%; animation-delay: 1.2s; }

		/* Falling data dots */
		.stream-dot {
			position: absolute;
			width: 6px;
			height: 6px;
			border-radius: 50%;
			background: var(--primary);
			box-shadow: 0 0 8px var(--primary);
			animation: dotFall 2s linear infinite;
		}
		.stream-line:nth-child(1) .stream-dot { animation-delay: 0.1s; }
		.stream-line:nth-child(2) .stream-dot { animation-delay: 0.5s; }
		.stream-line:nth-child(3) .stream-dot { animation-delay: 0.8s; }
		.stream-line:nth-child(4) .stream-dot { animation-delay: 1.1s; }
		.stream-line:nth-child(5) .stream-dot { animation-delay: 1.5s; }

		@keyframes streamPulse {
			0%, 100% { opacity: 0.3; }
			50% { opacity: 0.7; }
		}

		@keyframes dotFall {
			0% { top: -6px; opacity: 1; }
			100% { top: 80px; opacity: 0; }
		}

		/* Links grid */
		.links-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
			gap: 20px;
			width: 100%;
			padding: 0 10px;
		}

		.link-card {
			background: var(--card-bg);
			border: 1px solid var(--border);
			border-radius: var(--radius, 12px);
			padding: 28px 20px 24px;
			text-decoration: none;
			color: var(--text);
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 12px;
			transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
			position: relative;
			overflow: hidden;
		}
		.link-card::before {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			height: 3px;
			background: linear-gradient(90deg, var(--primary), #a78bfa);
			opacity: 0;
			transition: opacity 0.3s;
		}
		.link-card:hover {
			transform: translateY(-4px);
			box-shadow: 0 8px 28px rgba(124, 58, 237, 0.2);
			border-color: var(--primary);
		}
		.link-card:hover::before {
			opacity: 1;
		}

		.link-icon {
			width: 52px;
			height: 52px;
			border-radius: 14px;
			background: rgba(124, 58, 237, 0.1);
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 26px;
			transition: transform 0.2s, background 0.2s;
		}
		.link-card:hover .link-icon {
			transform: scale(1.1);
			background: rgba(124, 58, 237, 0.18);
		}

		.link-name {
			font-size: 1rem;
			font-weight: 600;
			color: var(--text);
		}
		.link-url {
			font-size: 0.78rem;
			color: var(--muted);
			word-break: break-all;
		}
		.link-badge {
			display: inline-block;
			padding: 3px 10px;
			font-size: 0.7rem;
			font-weight: 600;
			border-radius: 20px;
			background: rgba(124, 58, 237, 0.12);
			color: var(--primary);
			text-transform: uppercase;
			letter-spacing: 0.5px;
		}

		/* Floating particles behind cloud */
		.particles {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 200px;
			pointer-events: none;
			overflow: hidden;
		}
		.particle {
			position: absolute;
			width: 4px;
			height: 4px;
			border-radius: 50%;
			background: var(--primary);
			opacity: 0.3;
			animation: particleFloat 6s ease-in-out infinite;
		}
		.particle:nth-child(1) { left: 10%; top: 40px; animation-delay: 0s; }
		.particle:nth-child(2) { left: 25%; top: 80px; animation-delay: 1s; }
		.particle:nth-child(3) { left: 45%; top: 30px; animation-delay: 2s; }
		.particle:nth-child(4) { left: 60%; top: 90px; animation-delay: 0.5s; }
		.particle:nth-child(5) { left: 75%; top: 50px; animation-delay: 1.5s; }
		.particle:nth-child(6) { left: 88%; top: 70px; animation-delay: 3s; }
		.particle:nth-child(7) { left: 15%; top: 100px; animation-delay: 2.5s; }
		.particle:nth-child(8) { left: 55%; top: 110px; animation-delay: 3.5s; }

		@keyframes particleFloat {
			0%, 100% { transform: translateY(0) scale(1); opacity: 0.2; }
			50% { transform: translateY(-20px) scale(1.5); opacity: 0.5; }
		}

		/* Responsive */
		@media (max-width: 600px) {
			.cloud { width: 200px; height: 80px; }
			.cloud::before { width: 100px; height: 100px; top: -45px; left: 30px; }
			.cloud::after { width: 70px; height: 70px; top: -30px; right: 25px; }
			.links-grid { grid-template-columns: 1fr; }
			.link-card { padding: 22px 16px 20px; }
		}
	</style>
</head>

<body class="theme-dark">

	<header class="topbar">
		<div class="header-left">
			<a href="." class="brand-section">
				<div class="brand-text">jeo</div>
			</a>
			<a href="flash.html" class="header-nav-link">⚡ Flash Games</a>
			<a href="retro.html" class="header-nav-link">🎮 Retro Games</a>
			<a href="logs.html" class="header-nav-link">Logs</a>
			<a href="links.html" class="header-nav-link" style="color: var(--primary);">🔗 Links</a>
		</div>
		<div class="header-right">
			<div class="theme-btn-wrap" data-tooltip="Dark Mode">
				<button id="themeToggle" class="theme-btn" aria-label="Toggle theme">🌙</button>
			</div>
		</div>
	</header>

	<main class="links-page">
		<div class="links-header">
			<a href="." class="back-btn">← Back</a>
			<h1>Our Links</h1>
		</div>

		<div class="cloud-scene">
			<!-- Floating particles -->
			<div class="particles">
				<div class="particle"></div>
				<div class="particle"></div>
				<div class="particle"></div>
				<div class="particle"></div>
				<div class="particle"></div>
				<div class="particle"></div>
				<div class="particle"></div>
				<div class="particle"></div>
			</div>

			<!-- Cloud -->
			<div class="cloud">
				<span class="cloud-label">☁ Jeo Cloud</span>
			</div>

			<!-- Data streams -->
			<div class="streams">
				<div class="stream-line"><div class="stream-dot"></div></div>
				<div class="stream-line"><div class="stream-dot"></div></div>
				<div class="stream-line"><div class="stream-dot"></div></div>
				<div class="stream-line"><div class="stream-dot"></div></div>
				<div class="stream-line"><div class="stream-dot"></div></div>
			</div>

			<!-- Link cards -->
			<div class="links-grid">
				<!-- EDIT THESE: Add your actual domains below -->
				<a href="https://helpfulmathtips.netlify.app/" target="_blank" rel="noopener noreferrer" class="link-card">
					<div class="link-icon">🌐</div>
					<div class="link-name">Helpful Math tips</div>
					<div class="link-url">https://helpfulmathtips.netlify.app/</div>
					<span class="link-badge">Main</span>
				</a>


				
				<!-- Add more link cards here as needed -->
			</div>
		</div>
	</main>

	<script>
		// Theme toggle (matches main site)
		const toggle = document.getElementById('themeToggle');
		const saved = localStorage.getItem('theme');
		if (saved === 'light') {
			document.body.classList.replace('theme-dark', 'theme-light');
			toggle.textContent = '☀️';
		}
		toggle.addEventListener('click', () => {
			const isLight = document.body.classList.contains('theme-light');
			document.body.classList.replace(isLight ? 'theme-light' : 'theme-dark', isLight ? 'theme-dark' : 'theme-light');
			toggle.textContent = isLight ? '🌙' : '☀️';
			localStorage.setItem('theme', isLight ? 'dark' : 'light');
		});
	</script>

</body>
</html>
