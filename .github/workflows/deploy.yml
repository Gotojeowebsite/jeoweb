# CI & Deploy — runs Node.js server on Render with custom domain jeoweb.app
name: CI & Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Validate JavaScript
        run: |
          node --check server.js
          node --check app.js
          node --check scan.js

      - name: Generate games list
        run: node scan.js

      - name: Verify games list
        run: |
          COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('games_list.json','utf8')).length)")
          echo "Found $COUNT games"
          if [ "$COUNT" -lt 1 ]; then echo "No games found!" && exit 1; fi

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠ RENDER_DEPLOY_HOOK secret not set — skipping deploy"
            exit 0
          fi
          echo "Triggering deploy on Render..."
          curl -sf "$RENDER_DEPLOY_HOOK" || { echo "Deploy trigger failed"; exit 1; }
          echo "Deploy triggered successfully"

