<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>What's New - Jeo Unblocked Games</title>
	<link rel="stylesheet" href="styles.css" />
	<style>
		.new-page {
			max-width: 1100px;
			margin: 0 auto;
			padding: 32px 20px;
		}
		.new-header {
			display: flex;
			align-items: center;
			gap: 16px;
			margin-bottom: 32px;
		}
		.new-header h1 {
			font-size: 1.5rem;
			color: var(--text);
			margin: 0;
			font-weight: 700;
		}
		.back-btn {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			padding: 8px 18px;
			font-size: 0.9rem;
			font-weight: 600;
			color: var(--accent, #6c5ce7);
			background: transparent;
			border: 1.5px solid var(--accent, #6c5ce7);
			border-radius: 999px;
			text-decoration: none;
			cursor: pointer;
			transition: background 0.2s, color 0.2s;
		}
		.back-btn:hover {
			background: var(--accent, #6c5ce7);
			color: #fff;
		}
		.new-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
			gap: 18px;
		}
		.new-card {
			background: var(--card-bg, #232336);
			border-radius: 12px;
			overflow: hidden;
			cursor: pointer;
			transition: transform 0.15s, box-shadow 0.15s;
			position: relative;
		}
		.new-card:hover {
			transform: translateY(-3px);
			box-shadow: 0 6px 20px rgba(0,0,0,0.3);
		}
		.new-card img {
			width: 100%;
			aspect-ratio: 4/3;
			object-fit: cover;
			display: block;
			background: var(--card-bg, #232336);
		}
		.new-card-title {
			padding: 10px 12px;
			font-size: 0.9rem;
			font-weight: 600;
			color: var(--text);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}
		.new-badge {
			position: absolute;
			top: 8px;
			right: 8px;
			background: #00d2a0;
			color: #000;
			font-size: 0.65rem;
			font-weight: 700;
			padding: 2px 7px;
			border-radius: 999px;
			text-transform: uppercase;
			letter-spacing: 0.04em;
		}
		.new-empty {
			text-align: center;
			padding: 80px 20px;
			color: var(--text-muted, #888);
			font-size: 1.1rem;
		}
		.new-count {
			color: var(--text-muted, #888);
			font-size: 0.9rem;
			font-weight: 400;
			margin-left: 4px;
		}
	</style>
</head>
<body class="theme-dark">
	<div class="new-page">
		<div class="new-header">
			<a href="index.html" class="back-btn">← Back</a>
			<h1>What's New <span id="countBadge" class="new-count"></span></h1>
		</div>
		<div id="newGrid" class="new-grid"></div>
		<div id="emptyMsg" class="new-empty" style="display:none;">No new games right now — check back soon!</div>
	</div>

	<script>
	(async () => {
		const theme = localStorage.getItem('jeo-theme') || 'dark';
		document.body.className = 'theme-' + theme;

		const fallback = 'notavailable.svg';
		let games = [];
		let newNames = [];

		try {
			const [gRes, nRes] = await Promise.all([
				fetch('games_list.json', { cache: 'no-store' }),
				fetch('recently_added.json', { cache: 'no-store' })
			]);
			if (gRes.ok) {
				const text = await gRes.text();
				games = JSON.parse(text.replace(/^\uFEFF/, ''));
			}
			if (nRes.ok) newNames = await nRes.json();
		} catch (e) {
			console.warn('Failed to load data', e);
		}

		// Order preserved from recently_added.json (newest first)
		const newGames = newNames
			.map(name => games.find(g => g.name === name))
			.filter(Boolean);

		const grid = document.getElementById('newGrid');
		const emptyMsg = document.getElementById('emptyMsg');
		const countBadge = document.getElementById('countBadge');

		if (newGames.length === 0) {
			emptyMsg.style.display = '';
			return;
		}

		countBadge.textContent = '(' + newGames.length + ')';

		newGames.forEach((g, i) => {
			const card = document.createElement('div');
			card.className = 'new-card';
			const img = g.image || fallback;
			card.innerHTML = '<img src="' + img + '" alt="' + g.name + '" loading="lazy" onerror="this.onerror=null;this.src=\'' + fallback + '\';" />'
				+ (i === 0 ? '<span class="new-badge">Latest</span>' : '')
				+ '<div class="new-card-title">' + g.name + '</div>';
			card.addEventListener('click', () => { window.location.href = g.url; });
			grid.appendChild(card);
		});
	})();
	</script>
</body>
</html>
</html>
